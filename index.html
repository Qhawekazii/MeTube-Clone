<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MeTube</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="top-bar">
    <div class="brand">
      <button class="icon-btn" id="menuBtn" aria-label="Toggle menu">
        <span class="hamburger"></span>
      </button>
      <h1><span class="play-logo"></span> MeTube</h1>
    </div>

    <form class="search" id="searchForm">
      <input id="searchInput" type="search" placeholder="Search">
      <button type="submit" aria-label="Search">
        <span class="search-icon"></span>
      </button>
    </form>

    <button class="icon-btn" id="themeBtn" aria-label="Toggle dark mode">
      <span class="moon-icon"></span>
    </button>
  </header>

  <aside class="sidebar" id="sidebar">
    <a class="active" href="#"><span class="side-icon icon-home"></span><span>Home</span></a>
    <a href="#"><span class="side-icon icon-shorts"></span><span>Shorts</span></a>
    <a href="#"><span class="side-icon icon-subscriptions"></span><span>Subscriptions</span></a>
    <a href="#"><span class="side-icon icon-library"></span><span>Library</span></a>
    <a href="#"><span class="side-icon icon-history"></span><span>History</span></a>
    <a href="#"><span class="side-icon icon-playlists"></span><span>Playlists</span></a>
  </aside>

  <main class="content">
    <section class="chips" aria-label="Video categories">
      <button class="chip active" data-category="All">All</button>
      <button class="chip" data-category="Music">Music</button>
      <button class="chip" data-category="Gaming">Gaming</button>
      <button class="chip" data-category="Coding">Coding</button>
      <button class="chip" data-category="Food">Food</button>
      <button class="chip" data-category="Travel">Travel</button>
    </section>

    <section class="playlist">
      <div>
        <p>Featured playlist</p>
        <h2>Study Break Mix</h2>
      </div>
      <button id="playlistBtn">Save playlist</button>
    </section>

    <section class="video-grid" id="videoGrid" aria-label="Video list"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
